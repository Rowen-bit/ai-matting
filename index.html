<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>抠图工坊</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
/* ===== RESET & BASE ===== */
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8f9fb;
  --surface:#ffffff;
  --border:#e8ecf1;
  --text-primary:#1a2332;
  --text-secondary:#5c6b7f;
  --text-muted:#8d99ae;
  --accent:#4a6cf7;
  --accent-light:#eef2ff;
  --success:#2ecc71;
  --error:#e74c3c;
  --info:#4a90d9;
  --shadow-sm:0 1px 3px rgba(26,35,50,0.04),0 1px 2px rgba(26,35,50,0.02);
  --shadow-md:0 4px 16px rgba(26,35,50,0.06),0 2px 6px rgba(26,35,50,0.03);
  --shadow-lg:0 12px 40px rgba(26,35,50,0.08),0 4px 12px rgba(26,35,50,0.04);
  --radius-sm:10px;
  --radius-md:16px;
  --radius-lg:24px;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;
  background:var(--bg);
  color:var(--text-primary);
  min-height:100vh;
  line-height:1.5;
}

/* ===== NAVBAR ===== */
.navbar{
  background:var(--surface);
  border-bottom:1px solid var(--border);
  padding:0 1.5rem;
  position:sticky;top:0;z-index:1000;
  backdrop-filter:blur(20px);background:rgba(255,255,255,0.85);
}
.navbar-inner{max-width:800px;margin:0 auto;display:flex;align-items:center;height:60px;gap:0.75rem}
.logo{
  font-size:1.15rem;font-weight:700;color:var(--text-primary);
  display:flex;align-items:center;gap:0.55rem;letter-spacing:-0.01em
}
.logo-icon{
  width:30px;height:30px;background:linear-gradient(135deg,var(--accent),#7c5cfc);
  border-radius:8px;display:flex;align-items:center;justify-content:center;color:white;font-size:0.85rem
}

/* ===== MAIN ===== */
.main{max-width:800px;margin:0 auto;padding:2rem 1rem 3rem}

/* ===== HERO ===== */
.hero{text-align:center;padding:2.5rem 0 2rem}
.hero-badge{
  display:inline-flex;align-items:center;gap:0.4rem;
  background:var(--accent-light);color:var(--accent);
  padding:0.3rem 0.75rem;border-radius:20px;
  font-size:0.78rem;font-weight:500;margin-bottom:1rem;
}
.hero h1{
  font-size:1.95rem;font-weight:700;color:var(--text-primary);
  letter-spacing:-0.03em;margin-bottom:0.65rem;line-height:1.25
}
.hero p{
  font-size:1.05rem;color:var(--text-secondary);max-width:420px;margin:0 auto 0.45rem
}
.hero .sub{
  font-size:0.82rem;color:var(--text-muted)
}

/* ===== UPLOAD SECTION ===== */
.upload-section{
  background:var(--surface);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-md);padding:2rem;
  border:1px solid var(--border);
  margin-top:1.25rem
}
.upload-area{
  border:2px dashed #c5cee0;border-radius:var(--radius-md);
  padding:2.8rem 1.5rem;text-align:center;cursor:pointer;
  transition:all 0.25s cubic-bezier(.4,0,.2,1);
  background:linear-gradient(180deg,#fafbff 0%,#f5f7fa 100%);
  position:relative;overflow:hidden
}
.upload-area::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(74,108,247,0.04) 0%,transparent 100%);
  opacity:0;transition:opacity 0.25s
}
.upload-area:hover{
  border-color:var(--accent);transform:translateY(-1px);
  box-shadow:0 8px 24px rgba(74,108,247,0.08)
}
.upload-area:hover::before{opacity:1}
.upload-area.drag-over{
  border-color:var(--accent);background:var(--accent-light);
  transform:scale(1.005)
}
.upload-icon-wrap{
  width:64px;height:64px;margin:0 auto 1rem;
  background:linear-gradient(135deg,#eef2ff,#f0ebff);
  border-radius:18px;display:flex;align-items:center;justify-content:center;
  transition:all 0.25s
}
.upload-area:hover .upload-icon-wrap{
  transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(74,108,247,0.15)
}
.upload-icon-wrap i{
  font-size:1.6rem;color:var(--accent)
}
.upload-text{
  font-size:1rem;font-weight:500;color:var(--text-primary);margin-bottom:0.3rem
}
.upload-hint{font-size:0.82rem;color:var(--text-muted)}
#fileInput{display:none}

/* ===== MESSAGE ===== */
.msg{
  padding:0.7rem 1rem;border-radius:var(--radius-sm);
  margin:0.85rem 0;font-size:0.88rem;line-height:1.5;
  display:none;align-items:flex-start;gap:0.5rem
}
.msg.active{display:flex;animation:msgIn 0.3s ease-out}
@keyframes msgIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.msg.success{background:#f0fdf4;color:#166534;border:1px solid #bbf7d0}
.msg.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.msg.info{background:#eff6ff;color:#1e40af;border:1px solid #bfdbfe}
.msg i{margin-top:2px;font-size:0.82rem;flex-shrink:0}

/* ===== PREVIEW SECTION ===== */
.preview-section{display:none}
.preview-section.active{display:block;animation:fadeUp 0.4s ease-out}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

.section-header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:1.2rem
}
.section-title{
  font-size:1.05rem;font-weight:600;color:var(--text-primary);
  display:flex;align-items:center;gap:0.5rem
}
.section-title i{color:var(--accent);font-size:0.95rem}

.preview-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:1.25rem
}
@media(max-width:650px){.preview-grid{grid-template-columns:1fr}}

.preview-card{
  background:var(--surface);border-radius:var(--radius-md);
  border:1px solid var(--border);overflow:hidden;
  box-shadow:var(--shadow-sm)
}
.card-label{
  font-size:0.78rem;font-weight:600;color:var(--text-secondary);
  text-transform:uppercase;letter-spacing:0.04em;
  padding:0.65rem 1rem;border-bottom:1px solid var(--border);
  display:flex;align-items:center;gap:0.4rem
}
.card-label i{font-size:0.72rem;color:var(--text-muted)}

.image-frame{
  background:#f5f7fa;min-height:240px;
  display:flex;align-items:center;justify-content:center;
  position:relative;padding:1rem
}
.image-frame img{
  max-width:100%;max-height:320px;object-fit:contain;
  border-radius:6px
}
.result-frame{
  background-image:
    linear-gradient(45deg,#ececec 25%,transparent 25%),
    linear-gradient(-45deg,#ececec 25%,transparent 25%),
    linear-gradient(45deg,transparent 75%,#ececec 75%),
    linear-gradient(-45deg,transparent 75%,#ececec 75%);
  background-size:16px 16px;
  background-position:0 0,0 8px,8px -8px,-8px 0px;
  background-color:#f5f7fa
}

/* ===== LOADING OVERLAY ===== */
.loading-overlay{
  position:absolute;inset:0;
  background:rgba(255,255,255,0.92);backdrop-filter:blur(4px);
  display:none;align-items:center;justify-content:center;z-index:10;
  flex-direction:column;gap:0.6rem;padding:1.5rem
}
.loading-overlay.active{display:flex}

.spinner-wrap{
  width:36px;height:36px;position:relative
}
.spinner-ring{
  width:100%;height:100%;border:3px solid #e0e5ee;
  border-top-color:var(--accent);border-radius:50%;
  animation:spin 0.7s linear infinite
}
@keyframes spin{to{transform:rotate(360deg)}}

.loading-text{
  font-size:0.88rem;font-weight:600;color:var(--text-primary)
}
.loading-sub{font-size:0.78rem;color:var(--text-muted)}
.progress-track{
  width:160px;height:5px;background:#e8ecf1;border-radius:3px;
  overflow:hidden;margin-top:0.3rem
}
.progress-fill{
  height:100%;background:linear-gradient(90deg,var(--accent),#7c5cfc);
  border-radius:3px;transition:width 0.3s;width:0%
}

/* ===== BUTTONS ===== */
.btn-group{
  display:flex;gap:0.7rem;justify-content:center;flex-wrap:wrap;
  margin-top:1.5rem
}
.btn{
  padding:0.62rem 1.3rem;border:none;border-radius:var(--radius-sm);
  font-size:0.86rem;font-weight:600;cursor:pointer;
  transition:all 0.2s cubic-bezier(.4,0,.2,1);
  display:inline-flex;align-items:center;gap:0.45rem;
  font-family:inherit
}
.btn-primary{
  background:linear-gradient(135deg,var(--accent),#7c5cfc);
  color:white;box-shadow:0 3px 12px rgba(74,108,247,0.25)
}
.btn-primary:hover:not(:disabled){
  transform:translateY(-1px);box-shadow:0 5px 18px rgba(74,108,247,0.32)
}
.btn-primary:active:not(:disabled){transform:translateY(0)}
.btn-primary:disabled{opacity:0.45;cursor:not-allowed;box-shadow:none}
.btn-secondary{
  background:var(--surface);color:var(--text-secondary);
  border:1px solid var(--border);box-shadow:var(--shadow-sm)
}
.btn-secondary:hover{
  border-color:#c5cee0;background:#fafbff;transform:translateY(-1px)
}

/* ===== FOOTER ===== */
.footer{
  text-align:center;padding:2rem 0 1rem;
  font-size:0.78rem;color:var(--text-muted);
  border-top:1px solid var(--border);margin-top:2rem
}

/* ===== RESPONSIVE ===== */
@media(max-width:600px){
  .main{padding:1rem 0.75rem 2rem}
  .hero{padding:1.5rem 0 1.25rem}
  .hero h1{font-size:1.5rem}
  .hero p{font-size:0.92rem}
  .upload-section{padding:1.25rem}
  .upload-area{padding:2rem 1rem}
  .navbar-inner{height:54px}
  .logo{font-size:1.05rem}
}

/* ===== NAV BTN ===== */
.nav-btn{
  margin-left:auto;width:38px;height:38px;border:none;border-radius:10px;
  background:var(--accent-light);color:var(--accent);font-size:1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.nav-btn:hover{background:var(--accent);color:#fff}

/* ===== HISTORY PANEL ===== */
.history-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:2000;
  opacity:0;pointer-events:none;transition:opacity 0.3s;
}
.history-overlay.active{opacity:1;pointer-events:auto}
.history-panel{
  position:fixed;top:0;right:-400px;width:380px;max-width:90vw;
  height:100vh;background:var(--surface);z-index:2001;
  box-shadow:-8px 0 32px rgba(0,0,0,0.12);
  display:flex;flex-direction:column;
  transition:right 0.35s cubic-bezier(.4,0,.2,1);
}
.history-panel.active{right:0}
@media(max-width:500px){.history-panel{width:100vw;max-width:100vw}}
.history-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem 1.2rem;border-bottom:1px solid var(--border);
}
.history-title{font-size:1rem;font-weight:600;display:flex;align-items:center;gap:0.5rem}
.history-close{
  width:32px;height:32px;border:none;border-radius:8px;
  background:transparent;color:var(--text-muted);font-size:1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
}
.history-close:hover{background:#f0f0f0;color:var(--text-primary)}
.history-list{
  flex:1;overflow-y:auto;padding:1rem;
  display:flex;flex-direction:column;gap:0.75rem;
}
.history-empty{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;color:var(--text-muted);gap:0.5rem;
}
.history-empty i{font-size:2rem;opacity:0.4}
.history-empty p{font-size:0.9rem}
.history-empty-sub{font-size:0.78rem !important;opacity:0.6}
.history-item{
  background:var(--bg);border-radius:var(--radius-sm);
  padding:0.75rem;display:flex;gap:0.75rem;align-items:center;
  border:1px solid var(--border);transition:all 0.2s;cursor:pointer;
}
.history-item:hover{border-color:var(--accent);box-shadow:var(--shadow-sm)}
.history-thumb{
  width:56px;height:56px;object-fit:cover;border-radius:8px;
  background:#e8ecf1;flex-shrink:0;
}
.history-info{flex:1;min-width:0}
.history-name{font-size:0.82rem;font-weight:500;color:var(--text-primary);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.history-time{font-size:0.72rem;color:var(--text-muted);margin-top:2px}
.history-actions{display:flex;gap:0.35rem;flex-shrink:0}
.history-act-btn{
  width:30px;height:30px;border:none;border-radius:8px;
  background:var(--surface);color:var(--text-secondary);font-size:0.78rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--border);transition:all 0.2s;
}
.history-act-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.history-act-btn.del:hover{background:var(--error);color:#fff;border-color:var(--error)}
.history-footer{
  padding:0.75rem 1.2rem;border-top:1px solid var(--border);
  display:flex;justify-content:flex-end;
}

  </style>
</head>
<body>

<nav class="navbar">
<div class="navbar-inner">
<div class="logo"><div class="logo-icon"><i class="fas fa-crop-simple"></i></div><span>抠图工坊</span></div>
  <button class="nav-btn" id="historyBtn" title="历史记录"><i class="fas fa-clock-rotate-left"></i></button>

</nav>

<main class="main">

<div class="hero">

<h1>一键去除图片背景</h1>
<p>上传图片即可获得透明背景 PNG</p>

<div class="upload-section">

<div class="upload-icon-wrap"><i class="fas fa-cloud-arrow-up"></i></div>

</div>
<div class="preview-card">

<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

</div>
</div>
</div>
<div class="btn-group">

</div>
</div>

</footer>

<script>
(function(){
'use strict';

var $ = function(id){ return document.getElementById(id); };
var uploadArea      = $('uploadArea');
var fileInput       = $('fileInput');
var previewSection  = $('previewSection');
var originalImage   = $('originalImage');
var resultImage     = $('resultImage');
var loadingEl       = $('loading');
var loadingText     = $('loadingText');
var loadingProgress = $('loadingProgress');
var progressFill    = $('progressFill');
var downloadBtn     = $('downloadBtn');
var resetBtn        = $('resetBtn');
var messageEl       = $('message');

var originalFile = null;
var resultBlob   = null;

// 代理地址：支持 localStorage 配置，部署后设一次即可
// 设置方法：浏览器控制台执行
//   localStorage.setItem('api', 'https://xxx.cn-shanghai.fc.aliyuncs.com/api/matting')
var PROXY_URL = localStorage.getItem('api') || 'https://matting-ai-matting-svc-evgawfnhsq.cn-shanghai.fcapp.run/api/matting';

// 在页面右上角显示当前 API 地址（方便确认）
setTimeout(function(){
  if(localStorage.getItem('api')){
    var el = document.createElement('div');
    el.style.cssText = 'position:fixed;top:62px;right:12px;font-size:11px;color:#8d99ae;background:#fff;padding:3px 8px;border-radius:6px;border:1px solid #e8ecf1;z-index:9999';
    el.textContent = 'API: ' + localStorage.getItem('api').slice(0,30) + '...';
    document.body.appendChild(el);
  }
}, 500);

// Upload
uploadArea.addEventListener('click', function(e){ e.preventDefault(); fileInput.click(); });
fileInput.addEventListener('change', function(e){ if(e.target.files[0]) handleFile(e.target.files[0]); });
uploadArea.addEventListener('dragover', function(e){ e.preventDefault(); uploadArea.classList.add('drag-over'); });
uploadArea.addEventListener('dragleave', function(e){ e.preventDefault(); uploadArea.classList.remove('drag-over'); });
uploadArea.addEventListener('drop', function(e){
  e.preventDefault(); uploadArea.classList.remove('drag-over');
  var file = e.dataTransfer.files[0];
  if(file && file.type.startsWith('image/')) handleFile(file);
  else showMsg('请选择图片文件','error');
});

function handleFile(file){
  if(!file.type.match(/^image\/(jpeg|png|webp)$/)){
    showMsg('仅支持 JPG、PNG、WebP 格式','error'); return;
  }
  // 不再硬限制文件大小，智能压缩会处理大图
  originalFile = file;
  var reader = new FileReader();
  reader.onload = function(e){
    originalImage.src = e.target.result;
    previewSection.classList.add('active');
    resultImage.style.display = 'none';
    loadingEl.classList.remove('active');
    showMsg('图片已上传，正在处理...','info');
    startProcessing();
  };
  reader.readAsDataURL(file);
}

function setProgress(pct, text, sub){
  if(pct !== null) progressFill.style.width = pct + '%';
  if(text) loadingText.textContent = text;
  if(sub)  loadingProgress.textContent = sub;
}

// ===== 智能压缩图片：分步压缩直到 base64 ≤ 3.5MB =====
function compressToBase64(file){
  return new Promise(function(resolve, reject){
    var img = new Image();
    img.onload = function(){
      // 压缩参数档位：逐步缩小尺寸和质量
      var levels = [
        {maxDim: 1600, quality: 0.90},
        {maxDim: 1200, quality: 0.85},
        {maxDim: 1000, quality: 0.80},
        {maxDim: 800,  quality: 0.75},
        {maxDim: 600,  quality: 0.70},
      ];
      // base64 编码膨胀约33%，FC请求体限制约4MB，留余量 → base64 ≤3.5MB
      var maxBase64Size = 3.5 * 1024 * 1024;
      var base64 = null;
      var origW = img.width, origH = img.height;

      for(var i = 0; i < levels.length; i++){
        var lvl = levels[i];
        var w = origW, h = origH;
        if(w > lvl.maxDim || h > lvl.maxDim){
          var scale = Math.min(lvl.maxDim / w, lvl.maxDim / h);
          w = Math.round(w * scale);
          h = Math.round(h * scale);
        }
        var canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        var ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, w, h);
        var dataUrl = canvas.toDataURL('image/jpeg', lvl.quality);
        base64 = dataUrl.split(',')[1];
        // 检查base64大小（字符串长度≈字节数）
        if(base64.length <= maxBase64Size){
          console.log('压缩成功：' + origW + 'x' + origH + ' → ' + w + 'x' + h + ', Q=' + lvl.quality + ', base64=' + Math.round(base64.length/1024) + 'KB');
          break;
        }
        console.log('档位' + i + '仍太大(base64=' + Math.round(base64.length/1024) + 'KB)，继续压缩...');
      }
      resolve(base64);
    };
    img.onerror = reject;
    img.src = URL.createObjectURL(file);
  });
}

// ===== 图片转 Base64（去掉 data: URL 前缀） =====
function fileToBase64(file){
  return new Promise(function(resolve, reject){
    var reader = new FileReader();
    reader.onload = function(){
      var base64 = reader.result.split(',')[1];
      resolve(base64);
    };
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

async function startProcessing(){
  if(!originalFile) return;
  loadingEl.classList.add('active');
  resultImage.style.display = 'none';
  downloadBtn.disabled = true;

  try {
    setProgress(15,'正在压缩图片...','减少上传数据量');

    var imageBase64 = await compressToBase64(originalFile);

    setProgress(30,'上传到服务器...','调用阿里云 API');

    var resp = await fetch(PROXY_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imageBase64 })
    });

    if(!resp.ok){
      var errData;
      try { errData = await resp.json(); } catch(e) {}
      throw new Error((errData && errData.error) || '处理失败 (HTTP ' + resp.status + ')');
    }

    setProgress(70,'正在抠图...','阿里云 AI 识别主体');

    // 获取结果图片
    var blob = await resp.blob();
    if(!blob || blob.size === 0) throw new Error('处理未返回结果');

    setProgress(90,'优化边缘...','');

    resultBlob = blob;
    resultImage.src = URL.createObjectURL(blob);
    resultImage.style.display = 'block';
    downloadBtn.disabled = false;

    setProgress(100,'完成！','');
    setTimeout(function(){ loadingEl.classList.remove('active'); }, 500);

    showMsg('处理完成，点击「下载 PNG」保存','success');
        // 保存到历史记录
        if(window.addMattingHistory) window.addMattingHistory(resultImage.src);

  } catch(err){
    console.error('Processing error:', err);
    loadingEl.classList.remove('active');

    // 尝试后备方案：基础 Canvas 抠图
    if(err.message.indexOf('fetch') === -1 && err.message.indexOf('connect') === -1){
      showMsg('处理失败：' + err.message,'error');
    } else {
      showMsg('代理服务器未连接，使用基础算法...','info');
      try {
        await canvasMatting(originalFile);
      } catch(e2) {
        showMsg('所有方式均失败：' + e2.message,'error');
      }
    }
  }
}

// ===== 基础 Canvas 抠图（后备） =====
function canvasMatting(file){
  return new Promise(function(resolve, reject){
    setProgress(20,'使用基础算法处理...','效果有限');
    var img = new Image();
    img.onload = function(){
      var canvas = document.createElement('canvas');
      canvas.width = img.width; canvas.height = img.height;
      var ctx = canvas.getContext('2d'); ctx.drawImage(img,0,0);
      var data = ctx.getImageData(0,0,img.width,img.height).data;
      var samples = [
        {x:0,y:0},{x:Math.floor(img.width/2),y:0},{x:img.width-1,y:0},
        {x:0,y:Math.floor(img.height/2)},{x:img.width-1,y:Math.floor(img.height/2)},
        {x:0,y:img.height-1},{x:Math.floor(img.width/2),y:img.height-1},{x:img.width-1,y:img.height-1}
      ];
      var rSum=0,gSum=0,bSum=0;
      samples.forEach(function(s){
        var idx=(s.y*img.width+s.x)*4;
        rSum+=data[idx];gSum+=data[idx+1];bSum+=data[idx+2];
      });
      var bgR=rSum/samples.length,bgG=gSum/samples.length,bgB=bSum/samples.length,t=50;
      for(var i=0;i<data.length;i+=4){
        var d=Math.sqrt((data[i]-bgR)**2+(data[i+1]-bgG)**2+(data[i+2]-bgB)**2);
        if(d<t) data[i+3]=0;
      }
      ctx.putImageData(new ImageData(new Uint8ClampedArray(data),img.width,img.height),0,0);
      canvas.toBlob(function(blob){
        if(blob){
          resultBlob=blob;resultImage.src=URL.createObjectURL(blob);
          resultImage.style.display='block';downloadBtn.disabled=false;
          setProgress(100,'完成（基础模式）','');
          setTimeout(function(){loadingEl.classList.remove('active');},500);
          showMsg('基础算法效果有限，请启动代理服务获得更好的效果','info');
          resolve();
        } else reject(new Error('生成失败'));
      },'image/png');
    };
    img.onerror=function(){reject(new Error('图片加载失败'));};
    img.src=URL.createObjectURL(file);
  });
}


// ===== 历史记录功能 =====
(function(){
  var HISTORY_KEY = 'matting_history';
  var MAX_ITEMS = 20;

  function loadHistory(){
    try {
      return JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
    } catch(e){ return []; }
  }
  function saveHistory(list){
    localStorage.setItem(HISTORY_KEY, JSON.stringify(list));
  }

  function makeThumb(dataUrl, maxW, maxH){
    return new Promise(function(resolve){
      var img = new Image();
      img.onload = function(){
        var w = img.width, h = img.height;
        var scale = Math.min(maxW/w, maxH/h, 1);
        w = Math.round(w*scale); h = Math.round(h*scale);
        var c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(c.toDataURL('image/jpeg', 0.6));
      };
      img.onerror = function(){ resolve(dataUrl); };
      img.src = dataUrl;
    });
  }

  window.addMattingHistory = async function(resultDataUrl, fileName){
    var list = loadHistory();
    var thumb = await makeThumb(resultDataUrl, 200, 200);
    list.unshift({
      id: Date.now(),
      name: fileName || ('抠图_' + new Date().toLocaleString()),
      time: new Date().toLocaleString('zh-CN'),
      thumb: thumb,
      result: resultDataUrl   // 完整结果，用于下载
    });
    if(list.length > MAX_ITEMS) list = list.slice(0, MAX_ITEMS);
    saveHistory(list);
    renderHistory();
  };

  function renderHistory(){
    var list = loadHistory();
    var container = document.getElementById('historyList');
    var emptyEl = document.getElementById('historyEmpty');
    // 移除旧的历史项（保留 emptyEl）
    var oldItems = container.querySelectorAll('.history-item');
    oldItems.forEach(function(el){ el.remove(); });
    if(list.length === 0){
      emptyEl.style.display = 'flex';
    } else {
      emptyEl.style.display = 'none';
      list.forEach(function(item){
        var el = document.createElement('div');
        el.className = 'history-item';
        el.innerHTML =
          '<img class="history-thumb" src="' + item.thumb + '" alt="缩略图">' +
          '<div class="history-info">' +
            '<div class="history-name">' + escapeHtml(item.name) + '</div>' +
            '<div class="history-time">' + escapeHtml(item.time) + '</div>' +
          '</div>' +
          '<div class="history-actions">' +
            '<button class="history-act-btn download" title="下载"><i class="fas fa-download"></i></button>' +
            '<button class="history-act-btn preview" title="预览"><i class="fas fa-eye"></i></button>' +
            '<button class="history-act-btn del" title="删除"><i class="fas fa-trash-can"></i></button>' +
          '</div>';
        // 事件
        el.querySelector('.download').addEventListener('click', function(e){
          e.stopPropagation();
          downloadFromHistory(item);
        });
        el.querySelector('.preview').addEventListener('click', function(e){
          e.stopPropagation();
          previewFromHistory(item);
        });
        el.querySelector('.del').addEventListener('click', function(e){
          e.stopPropagation();
          deleteHistoryItem(item.id);
        });
        el.addEventListener('click', function(){ previewFromHistory(item); });
        container.appendChild(el);
      });
    }
  };

  function downloadFromHistory(item){
    var a = document.createElement('a');
    a.href = item.result;
    a.download = (item.name || '抠图结果') + '.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  }
  function previewFromHistory(item){
    // 在主区域展示
    var resultImg = document.getElementById('resultImage');
    var previewSec = document.getElementById('previewSection');
    if(resultImg && previewSec){
      resultImg.src = item.result;
      resultImg.style.display = 'block';
      previewSec.classList.add('active');
      document.getElementById('downloadBtn').disabled = false;
      // 更新全局 resultBlob（如果可能）
      fetch(item.result).then(function(r){ return r.blob(); }).then(function(b){
        window._historyResultBlob = b;
      });
      window.scrollTo({top:0, behavior:'smooth'});
    }
    closeHistoryPanel();
  }
  window._historyResultBlob = null;
  // 覆盖全局 download 逻辑，优先用历史 blob
  var origDownload = document.getElementById('downloadBtn');
  if(origDownload){
    origDownload.addEventListener('click', function(){
      if(window._historyResultBlob){
        var a = document.createElement('a');
        a.href = URL.createObjectURL(window._historyResultBlob);
        a.download = '抠图_' + Date.now() + '.png';
        document.body.appendChild(a); a.click(); document.body.removeChild(a);
      }
    });
  }

  function deleteHistoryItem(id){
    var list = loadHistory().filter(function(x){ return x.id !== id; });
    saveHistory(list);
    renderHistory();
  }

  function openHistoryPanel(){ document.getElementById('historyOverlay').classList.add('active'); document.getElementById('historyPanel').classList.add('active'); renderHistory(); }
  function closeHistoryPanel(){ document.getElementById('historyOverlay').classList.remove('active'); document.getElementById('historyPanel').classList.remove('active'); }
  window.openHistoryPanel = openHistoryPanel;
  window.closeHistoryPanel = closeHistoryPanel;

  document.getElementById('historyBtn').addEventListener('click', openHistoryPanel);
  document.getElementById('historyClose').addEventListener('click', closeHistoryPanel);
  document.getElementById('historyOverlay').addEventListener('click', closeHistoryPanel);
  document.getElementById('historyClearBtn').addEventListener('click', function(){
    if(confirm('确定清空所有历史记录？')){ saveHistory([]); renderHistory(); }
  });

  function escapeHtml(str){
    var div = document.createElement('div'); div.textContent = str; return div.innerHTML;
  }

  // 页面加载时预渲染（不用等面板打开）
  renderHistory();
})();

  originalImage.src='';resultImage.src='';resultImage.style.display='none';
