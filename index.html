<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>抠图工坊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
/* ===== 星露谷物语风格 ===== */
*{margin:0;padding:0;box-sizing:border-box}

:root{
  --wood-bg:#3b2f2f;
  --dialog-bg:#f5e6c8;
  --dialog-border:#8b6914;
  --dialog-border-dark:#5a4410;
  --dialog-shadow:rgba(0,0,0,0.4);
  --btn-green:#6ab04c;
  --btn-green-dark:#4a8a2c;
  --btn-red:#e74c3c;
  --btn-red-dark:#c0392b;
  --btn-blue:#5dade2;
  --btn-blue-dark:#2e86c1;
  --text-dark:#3d2b1f;
  --text-light:#f5e6c8;
  --text-green:#2d6a1e;
  --accent:#d4a84b;
  --sky-top:#87ceeb;
  --sky-bottom:#c8e6c9;
  --grass:#6ab04c;
  --grass-dark:#4a8a2c;
  --dirt:#c8a96e;
  --dirt-dark:#a08050;
}

body{
  font-family:'ZCOOL KuaiLe','Microsoft YaHei',sans-serif;
  background:var(--sky-top);
  min-height:100vh;
  overflow-x:hidden;
  color:var(--text-dark);
}

/* ===== 星露谷场景背景 ===== */
.scene-bg{
  position:fixed;inset:0;z-index:-1;overflow:hidden;
}

/* 天空渐变 - 白天暖色 */
.sky{
  position:absolute;inset:0;
  background:linear-gradient(180deg, #5b9bd5 0%, #87ceeb 30%, #b8e6b8 70%, #a8d8a8 100%);
}

/* 太阳 */
.sun{
  position:absolute;top:8%;right:15%;
  width:50px;height:50px;
  background:radial-gradient(circle, #fff7a0 30%, #ffe066 60%, transparent 70%);
  border-radius:50%;
  box-shadow:0 0 40px 15px rgba(255,224,102,0.4);
  animation:sunPulse 3s ease-in-out infinite;
}
@keyframes sunPulse{0%,100%{box-shadow:0 0 40px 15px rgba(255,224,102,0.4)}50%{box-shadow:0 0 55px 20px rgba(255,224,102,0.5)}}

/* 像素云朵 */
.cloud{
  position:absolute;
  background:#fff;
  border-radius:20px;
  opacity:0.85;
  animation:cloudDrift 40s linear infinite;
}
.cloud::before,.cloud::after{
  content:'';position:absolute;background:#fff;border-radius:50%;
}
.cloud-1{width:70px;height:22px;top:12%;left:-80px;animation-duration:45s}
.cloud-1::before{width:30px;height:28px;top:-14px;left:10px}
.cloud-1::after{width:22px;height:22px;top:-8px;left:35px}
.cloud-2{width:55px;height:18px;top:18%;left:-60px;animation-duration:55s;animation-delay:-20s}
.cloud-2::before{width:24px;height:22px;top:-10px;left:8px}
.cloud-2::after{width:18px;height:18px;top:-6px;left:28px}
.cloud-3{width:45px;height:16px;top:8%;left:-50px;animation-duration:50s;animation-delay:-35s}
.cloud-3::before{width:20px;height:20px;top:-10px;left:6px}
.cloud-3::after{width:16px;height:16px;top:-6px;left:22px}

@keyframes cloudDrift{from{transform:translateX(0)}to{transform:translateX(calc(100vw + 100px))}}

/* 远山 */
.mountains{
  position:absolute;bottom:28%;left:0;right:0;height:25%;
  background:
    /* 远山层1 */
    linear-gradient(160deg, transparent 35%, #5a9a5a 35%, #5a9a5a 55%, transparent 55%) 0 0 / 120px 100% no-repeat,
    linear-gradient(200deg, transparent 40%, #4a8a4a 40%, #4a8a4a 60%, transparent 60%) 80px 0 / 100px 100% no-repeat,
    /* 远山层2 */
    linear-gradient(155deg, transparent 30%, #6aaa6a 30%, #6aaa6a 50%, transparent 50%) 30px 0 / 150px 100% no-repeat,
    linear-gradient(205deg, transparent 35%, #5a9a5a 35%, #5a9a5a 55%, transparent 55%) 100px 0 / 130px 100% no-repeat;
}

/* 树木剪影 */
.tree-silhouette{
  position:absolute;bottom:28%;
}
.tree-silhouette::before{
  content:'';display:block;
  width:0;height:0;
  border-left:15px solid transparent;
  border-right:15px solid transparent;
  border-bottom:40px solid #3a7a3a;
  margin-bottom:-5px;
}
.tree-silhouette::after{
  content:'';display:block;
  width:8px;height:15px;
  background:#6b4423;
  margin:0 auto;
}
.ts-1{left:5%}.ts-2{left:15%}.ts-3{right:8%}.ts-4{right:20%}

/* 草地 */
.ground{
  position:absolute;bottom:0;left:0;right:0;height:30%;
  background:linear-gradient(180deg, #7ec850 0%, #6ab04c 20%, #5a9a3a 50%, #c8a96e 80%, #a08050 100%);
}

/* 草地顶部装饰 - 像素小草 */
.ground::before{
  content:'';
  position:absolute;top:-6px;left:0;right:0;height:12px;
  background:
    repeating-linear-gradient(90deg,
      transparent 0px, transparent 6px,
      #7ec850 6px, #7ec850 8px,
      transparent 8px, transparent 14px,
      #6ab04c 14px, #6ab04c 15px,
      transparent 15px, transparent 22px
    );
  opacity:0.7;
}

/* 栅栏 */
.fence{
  position:absolute;bottom:28%;left:0;right:0;height:30px;
  display:flex;align-items:flex-end;
  padding:0 5%;
}
.fence-post{
  width:8px;height:30px;
  background:linear-gradient(90deg,#8b6914,#a07828,#8b6914);
  margin:0 20px;
  position:relative;
}
.fence-post::before{
  content:'';position:absolute;top:-4px;left:-3px;right:-3px;height:8px;
  background:linear-gradient(90deg,#8b6914,#b8942e,#8b6914);
  border-radius:2px;
}
.fence-rail{
  position:absolute;bottom:28%;left:5%;right:5%;height:3px;
  background:linear-gradient(90deg,#8b6914,#a07828,#8b6914);
}
.fence-rail-2{bottom:calc(28% + 12px)}

/* ===== 主容器 ===== */
.main-wrap{
  position:relative;
  max-width:580px;
  margin:0 auto;
  padding:1rem 1rem 2rem;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ===== 星露谷对话框风格 ===== */
.sd-dialog{
  width:100%;
  background:var(--dialog-bg);
  border:5px solid var(--dialog-border);
  border-radius:14px;
  padding:1.2rem;
  position:relative;
  box-shadow:
    0 6px 0 var(--dialog-border-dark),
    0 8px 20px var(--dialog-shadow);
  image-rendering:auto;
}

/* 对话框内部装饰角 */
.sd-dialog::before{
  content:'';position:absolute;
  top:8px;left:8px;right:8px;bottom:8px;
  border:2px solid rgba(139,105,20,0.2);
  border-radius:10px;
  pointer-events:none;
}

/* ===== 标题 ===== */
.game-header{
  text-align:center;
  margin:1.5rem 0 1.2rem;
}

.title-banner{
  display:inline-block;
  background:linear-gradient(180deg, #d4a84b 0%, #b88d3e 100%);
  border:4px solid #5a4410;
  border-radius:10px;
  padding:0.8rem 2rem;
  box-shadow:
    0 4px 0 #3d2b1f,
    0 6px 12px rgba(0,0,0,0.3);
  position:relative;
}

.title-banner h1{
  font-size:1.6rem;
  color:#fff;
  text-shadow:2px 2px 0 #5a4410,0 0 8px rgba(255,255,255,0.3);
  letter-spacing:3px;
}

.title-sub{
  font-size:0.85rem;
  color:var(--text-green);
  margin-top:0.4rem;
  text-shadow:1px 1px 0 rgba(255,255,255,0.5);
}

/* ===== 星露谷风格按钮 ===== */
.sd-btn{
  display:block;width:100%;
  padding:0.7rem 1rem;
  font-family:inherit;font-size:1rem;
  border:3px solid #3d2b1f;
  border-radius:8px;
  cursor:pointer;
  text-align:center;
  position:relative;
  font-weight:bold;
  transition:none;
}

/* 绿色按钮 */
.sd-btn-green{
  background:linear-gradient(180deg, #7ec850 0%, #5a9a3a 100%);
  color:#fff;
  text-shadow:1px 1px 0 #3d5a1e;
  box-shadow:0 4px 0 #3d6a1e, 0 6px 8px rgba(0,0,0,0.2);
  border-color:#3d5a1e;
}
.sd-btn-green:hover{background:linear-gradient(180deg, #8ed860 0%, #6aaa4a 100%)}
.sd-btn-green:active{
  box-shadow:0 1px 0 #3d6a1e;transform:translateY(3px);
}

/* 蓝色按钮 */
.sd-btn-blue{
  background:linear-gradient(180deg, #5dade2 0%, #2e86c1 100%);
  color:#fff;
  text-shadow:1px 1px 0 #1a4a6e;
  box-shadow:0 4px 0 #1a4a6e, 0 6px 8px rgba(0,0,0,0.2);
  border-color:#1a4a6e;
}
.sd-btn-blue:hover{background:linear-gradient(180deg, #7ec8f0 0%, #4a9ad5 100%)}
.sd-btn-blue:active{
  box-shadow:0 1px 0 #1a4a6e;transform:translateY(3px);
}

/* 红色按钮 */
.sd-btn-red{
  background:linear-gradient(180deg, #e74c3c 0%, #c0392b 100%);
  color:#fff;
  text-shadow:1px 1px 0 #7b241c;
  box-shadow:0 4px 0 #7b241c, 0 6px 8px rgba(0,0,0,0.2);
  border-color:#7b241c;
}
.sd-btn-red:hover{background:linear-gradient(180deg, #f06050 0%, #d04a3a 100%)}
.sd-btn-red:active{
  box-shadow:0 1px 0 #7b241c;transform:translateY(3px);
}

.sd-btn:disabled{
  opacity:0.5;cursor:not-allowed;filter:grayscale(0.4);
}

/* ===== 上传区域 ===== */
.upload-area{
  border:3px dashed rgba(139,105,20,0.4);
  border-radius:10px;
  padding:2rem 1rem;
  text-align:center;
  cursor:pointer;
  background:repeating-linear-gradient(
    45deg,
    transparent 0px,transparent 8px,
    rgba(139,105,20,0.04) 8px,rgba(139,105,20,0.04) 16px
  );
  transition:all 0.15s;
}

.upload-area:hover{
  border-color:var(--accent);
  background:rgba(212,168,75,0.1);
}

.upload-area.drag-over{
  border-color:#d4a84b;
  background:rgba(212,168,75,0.15);
  transform:scale(1.02);
}

.upload-icon{font-size:2.2rem;margin-bottom:0.5rem}
.upload-text{font-size:1rem;color:var(--text-dark);margin-bottom:0.3rem}
.upload-hint{font-size:0.8rem;color:#8b7355}

#fileInput{display:none}

/* ===== 消息提示 ===== */
.msg{
  display:none;padding:0.7rem 1rem;font-size:0.85rem;
  border-radius:8px;margin-top:0.8rem;
  border:2px solid;
}
.msg.active{display:block;animation:msgBounce 0.3s ease-out}
@keyframes msgBounce{0%{transform:scale(0.9);opacity:0}100%{transform:scale(1);opacity:1}}

.msg.success{background:rgba(106,176,76,0.15);border-color:#6ab04c;color:#3d6a1e}
.msg.error{background:rgba(231,76,60,0.15);border-color:#e74c3c;color:#c0392b}
.msg.info{background:rgba(93,173,226,0.15);border-color:#5dade2;color:#2e86c1}

/* ===== 预览区域 ===== */
.preview-section{display:none}
.preview-section.active{display:block;animation:slideUp 0.4s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.section-title{
  text-align:center;font-size:1rem;
  color:var(--text-green);
  margin:1rem 0 0.8rem;
  text-shadow:1px 1px 0 rgba(255,255,255,0.5);
}

.preview-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;
}

@media(max-width:520px){.preview-grid{grid-template-columns:1fr}}

.preview-card{
  background:#faf0dc;
  border:3px solid var(--dialog-border);
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 3px 0 var(--dialog-border-dark);
}

.card-label{
  font-size:0.75rem;font-weight:bold;
  color:var(--text-dark);
  padding:0.4rem 0.6rem;
  text-align:center;
  border-bottom:2px solid rgba(139,105,20,0.3);
  background:rgba(139,105,20,0.08);
}

.image-frame{
  min-height:140px;
  display:flex;align-items:center;justify-content:center;
  padding:0.5rem;
  background:#faf0dc;
}

.image-frame img{
  max-width:100%;max-height:200px;object-fit:contain;
  border-radius:4px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* 透明背景棋盘格 */
.result-frame{
  background-image:
    linear-gradient(45deg, #eee4d0 25%, transparent 25%),
    linear-gradient(-45deg, #eee4d0 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #eee4d0 75%),
    linear-gradient(-45deg, transparent 75%, #eee4d0 75%);
  background-size:14px 14px;
  background-position:0 0,0 7px,7px -7px,-7px 0;
  background-color:#faf0dc;
}

/* ===== 加载动画 ===== */
.loading-overlay{
  position:absolute;inset:0;
  background:rgba(245,230,200,0.95);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:0.6rem;
  z-index:10;border-radius:0 0 7px 7px;
}

.loading-overlay.active{display:flex}

/* 星露谷风格旋转 - 小鸡/星星 */
.loader-icon{
  font-size:2rem;
  animation:loaderBounce 0.6s ease-in-out infinite alternate;
}
@keyframes loaderBounce{0%{transform:translateY(0) rotate(-5deg)}100%{transform:translateY(-8px) rotate(5deg)}}

.loading-text{font-size:0.9rem;color:var(--text-dark)}
.loading-sub{font-size:0.75rem;color:#8b7355}

/* 进度条 */
.progress-track{
  width:160px;height:12px;
  background:#e8d5b5;
  border:2px solid var(--dialog-border);
  border-radius:6px;overflow:hidden;
}
.progress-fill{
  height:100%;
  background:linear-gradient(180deg, #8ed860 0%, #5a9a3a 100%);
  border-radius:4px;
  transition:width 0.3s;
  width:0%;
}

/* ===== 按钮组 ===== */
.btn-group{
  display:flex;gap:0.6rem;justify-content:center;flex-wrap:wrap;
  margin-top:1rem;width:100%;
}
.btn-group .sd-btn{width:auto;min-width:130px}

/* ===== 底部 ===== */
.footer{
  text-align:center;padding:1.5rem 1rem;font-size:0.75rem;
  color:rgba(255,255,255,0.6);margin-top:auto;
  text-shadow:1px 1px 0 rgba(0,0,0,0.2);
}

/* ===== 历史记录按钮 ===== */
.history-btn{
  position:fixed;top:1rem;right:1rem;
  width:44px;height:44px;
  background:var(--dialog-bg);
  border:3px solid var(--dialog-border);
  border-radius:10px;
  font-size:1.1rem;
  cursor:pointer;z-index:100;
  box-shadow:0 3px 0 var(--dialog-border-dark),0 4px 8px rgba(0,0,0,0.2);
  display:flex;align-items:center;justify-content:center;
  transition:none;
}
.history-btn:active{
  box-shadow:0 1px 0 var(--dialog-border-dark);transform:translateY(2px);
}

/* ===== 历史面板 ===== */
.history-overlay{
  position:fixed;inset:0;
  background:rgba(0,0,0,0.6);
  z-index:2000;
  opacity:0;pointer-events:none;
  transition:opacity 0.2s;
}
.history-overlay.active{opacity:1;pointer-events:auto}

.history-panel{
  position:fixed;top:0;right:-360px;
  width:320px;max-width:90vw;height:100vh;
  background:var(--dialog-bg);
  border-left:5px solid var(--dialog-border);
  box-shadow:-4px 0 0 var(--dialog-border-dark),-8px 0 20px rgba(0,0,0,0.3);
  z-index:2001;display:flex;flex-direction:column;
  transition:right 0.3s ease-out;
}
.history-panel.active{right:0}

.history-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:0.8rem 1rem;
  border-bottom:3px solid var(--dialog-border);
  background:rgba(139,105,20,0.08);
}
.history-title{font-size:1rem;color:var(--text-dark)}
.history-close{
  width:32px;height:32px;
  background:linear-gradient(180deg, #e74c3c, #c0392b);
  border:2px solid #7b241c;border-radius:6px;
  color:#fff;font-size:0.9rem;cursor:pointer;
  box-shadow:0 2px 0 #7b241c;
  display:flex;align-items:center;justify-content:center;
}
.history-close:active{box-shadow:0 0 0 #7b241c;transform:translateY(2px)}

.history-list{
  flex:1;overflow-y:auto;padding:0.8rem;
  display:flex;flex-direction:column;gap:0.5rem;
}
.history-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:#8b7355;gap:0.5rem;text-align:center;font-size:0.9rem;
}
.history-empty-icon{font-size:2.5rem;opacity:0.4}

.history-item{
  background:#faf0dc;
  border:2px solid var(--dialog-border);
  border-radius:8px;
  padding:0.6rem;
  display:flex;gap:0.5rem;align-items:center;
  cursor:pointer;
  box-shadow:0 2px 0 var(--dialog-border-dark);
}
.history-item:hover{border-color:var(--accent);background:#fff8e8}

.history-thumb{
  width:48px;height:48px;object-fit:cover;
  border:2px solid var(--dialog-border);border-radius:4px;flex-shrink:0;
}
.history-info{flex:1;min-width:0}
.history-name{font-size:0.75rem;color:var(--text-dark);word-break:break-all}
.history-time{font-size:0.65rem;color:#8b7355;margin-top:2px}

.history-actions{display:flex;gap:0.3rem;flex-shrink:0}
.h-act{
  width:28px;height:28px;
  border:2px solid var(--dialog-border);border-radius:5px;
  font-size:0.7rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:#faf0dc;color:var(--text-dark);
}
.h-act:hover{border-color:var(--accent)}
.h-act.del:hover{border-color:#e74c3c;color:#e74c3c}

.history-footer{
  padding:0.8rem;border-top:3px solid var(--dialog-border);
  background:rgba(139,105,20,0.08);
  display:flex;justify-content:flex-end;
}

/* 滚动条 */
::-webkit-scrollbar{width:10px}
::-webkit-scrollbar-track{background:#e8d5b5;border-radius:5px}
::-webkit-scrollbar-thumb{background:#b8942e;border-radius:5px;border:2px solid #e8d5b5}
::-webkit-scrollbar-thumb:hover{background:#8b6914}

/* ===== 响应式 ===== */
@media(max-width:520px){
  .title-banner h1{font-size:1.2rem}
  .sd-dialog{padding:0.8rem}
  .upload-area{padding:1.2rem 0.5rem}
  .history-panel{width:100vw;max-width:100vw}
  .btn-group .sd-btn{min-width:110px;font-size:0.9rem}
}
</style>
</head>
<body>

<!-- 星露谷场景背景 -->
<div class="scene-bg">
  <div class="sky"></div>
  <div class="sun"></div>
  <div class="cloud cloud-1"></div>
  <div class="cloud cloud-2"></div>
  <div class="cloud cloud-3"></div>
  <div class="mountains"></div>
  <div class="tree-silhouette ts-1"></div>
  <div class="tree-silhouette ts-2"></div>
  <div class="tree-silhouette ts-3"></div>
  <div class="tree-silhouette ts-4"></div>
  <div class="fence-rail"></div>
  <div class="fence-rail-2"></div>
  <div class="ground"></div>
</div>

<!-- 历史记录按钮 -->
<button class="history-btn" id="historyBtn" title="历史记录">📜</button>

<!-- 主内容 -->
<div class="main-wrap">

  <!-- 标题 -->
  <header class="game-header">
    <div class="title-banner">
      <h1>🏡 抠图工坊</h1>
    </div>
    <p class="title-sub">上传图片 · 一键去背景 · 保存透明图</p>
  </header>

  <!-- 上传面板 -->
  <div class="sd-dialog" style="margin-bottom:1rem">
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">🖼️</div>
      <div class="upload-text">点击选择或拖拽图片到此处</div>
      <div class="upload-hint">支持 JPG、PNG、WebP 格式 · 大图自动压缩</div>
    </div>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
    <div class="msg" id="message"><span></span></div>
  </div>

  <!-- 预览区域 -->
  <div class="preview-section" id="previewSection">
    <div class="sd-dialog">
      <div class="section-title">✨ 处理结果</div>
      <div class="preview-grid">
        <div class="preview-card">
          <div class="card-label">📷 原图</div>
          <div class="image-frame"><img id="originalImage" alt="原图"></div>
        </div>
        <div class="preview-card">
          <div class="card-label">🎯 抠图结果</div>
          <div class="image-frame result-frame" style="position:relative">
            <div class="loading-overlay" id="loading">
              <div class="loader-icon">🐣</div>
              <div class="loading-text" id="loadingText">正在处理中...</div>
              <div class="loading-sub" id="loadingProgress">准备就绪</div>
              <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
            </div>
            <img id="resultImage" alt="抠图结果" style="display:none;">
          </div>
        </div>
      </div>
      <div class="btn-group">
        <button class="sd-btn sd-btn-blue" id="downloadBtn" disabled>
          💾 保存结果
        </button>
        <button class="sd-btn sd-btn-green" id="resetBtn">
          🔄 重新开始
        </button>
      </div>
    </div>
  </div>

  <footer class="footer">
    🌾 基于阿里云分割接口 · 抠图工坊 2026
  </footer>

</div>

<!-- 历史面板 -->
<div class="history-overlay" id="historyOverlay"></div>
<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <span class="history-title">📜 处理记录</span>
    <button class="history-close" id="historyClose">✕</button>
  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty" id="historyEmpty">
      <div class="history-empty-icon">📦</div>
      <p>暂无记录</p>
      <p>完成抠图后会自动保存</p>
    </div>
  </div>
  <div class="history-footer">
    <button class="sd-btn sd-btn-red" id="historyClearBtn" style="font-size:0.8rem;padding:0.4rem 0.8rem;width:auto">
      🗑️ 清空记录
    </button>
  </div>
</div>

<script>
(function(){
'use strict';

var $=function(id){return document.getElementById(id)};
var uploadArea=$('uploadArea'),fileInput=$('fileInput'),
    previewSection=$('previewSection'),originalImage=$('originalImage'),
    resultImage=$('resultImage'),loadingEl=$('loading'),
    loadingText=$('loadingText'),loadingProgress=$('loadingProgress'),
    progressFill=$('progressFill'),downloadBtn=$('downloadBtn'),
    resetBtn=$('resetBtn'),messageEl=$('message');

var originalFile=null,resultBlob=null;
var PROXY_URL=localStorage.getItem('api')||'https://matting-ai-matting-svc-evgawfnhsq.cn-shanghai.fcapp.run/api/matting';

uploadArea.addEventListener('click',function(e){e.preventDefault();fileInput.click()});
fileInput.addEventListener('change',function(e){if(e.target.files[0])handleFile(e.target.files[0])});
uploadArea.addEventListener('dragover',function(e){e.preventDefault();uploadArea.classList.add('drag-over')});
uploadArea.addEventListener('dragleave',function(e){e.preventDefault();uploadArea.classList.remove('drag-over')});
uploadArea.addEventListener('drop',function(e){
  e.preventDefault();uploadArea.classList.remove('drag-over');
  var f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/'))handleFile(f);else showMsg('请选择图片文件','error');
});

function handleFile(file){
  if(!file.type.match(/^image\/(jpeg|png|webp)$/)){showMsg('仅支持 JPG、PNG、WebP 格式','error');return}
  originalFile=file;
  var r=new FileReader();
  r.onload=function(e){
    originalImage.src=e.target.result;
    previewSection.classList.add('active');
    resultImage.style.display='none';loadingEl.classList.remove('active');
    showMsg('图片已加载，开始处理...','info');
    startProcessing();
  };
  r.readAsDataURL(file);
}

function setProgress(pct,text,sub){
  if(pct!==null)progressFill.style.width=pct+'%';
  if(text)loadingText.textContent=text;
  if(sub)loadingProgress.textContent=sub;
}

function compressToBase64(file){
  return new Promise(function(resolve,reject){
    var img=new Image();img.onload=function(){
      var levels=[{maxDim:1600,quality:0.90},{maxDim:1200,quality:0.85},{maxDim:1000,quality:0.80},{maxDim:800,quality:0.75},{maxDim:600,quality:0.70}];
      var maxS=3.5*1024*1024,b64=null;
      for(var i=0;i<levels.length;i++){
        var l=levels[i],w=img.width,h=img.height;
        if(w>l.maxDim||h>l.maxDim){var s=Math.min(l.maxDim/w,l.maxDim/h);w=Math.round(w*s);h=Math.round(h*s)}
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        b64=c.toDataURL('image/jpeg',l.quality).split(',')[1];
        if(b64.length<=maxS)break;
      }
      resolve(b64);
    };img.onerror=reject;img.src=URL.createObjectURL(file);
  });
}

async function startProcessing(){
  if(!originalFile)return;
  loadingEl.classList.add('active');resultImage.style.display='none';downloadBtn.disabled=true;
  try{
    setProgress(15,'正在压缩图片...','调整尺寸');
    var b64=await compressToBase64(originalFile);
    setProgress(30,'正在连接服务器...','发送请求');
    var resp=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:b64})});
    if(!resp.ok){var ed;try{ed=await resp.json()}catch(e){}throw new Error((ed&&ed.error)||'请求失败 (状态 '+resp.status+')')}
    setProgress(70,'正在智能分割...','AI识别中');
    var blob=await resp.blob();
    if(!blob||blob.size===0)throw new Error('未获得处理结果');
    setProgress(90,'优化边缘中...','');
    resultBlob=blob;resultImage.src=URL.createObjectURL(blob);resultImage.style.display='block';
    downloadBtn.disabled=false;setProgress(100,'处理完成！','');
    setTimeout(function(){loadingEl.classList.remove('active')},500);
    showMsg('处理成功！点击「保存结果」下载','success');
    if(window.addMattingHistory)window.addMattingHistory(resultImage.src);
  }catch(err){
    console.error(err);loadingEl.classList.remove('active');
    showMsg('处理失败：'+err.message,'error');
  }
}

// 历史记录
(function(){
  var KEY='matting_history',MAX=20;
  function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}
  function save(l){localStorage.setItem(KEY,JSON.stringify(l))}
  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

  window.addMattingHistory=async function(dataUrl){
    var list=load(),thumb=await mkThumb(dataUrl,200,200);
    list.unshift({id:Date.now(),name:'抠图_'+new Date().toLocaleString('zh-CN'),time:new Date().toLocaleString('zh-CN'),thumb:thumb,result:dataUrl});
    if(list.length>MAX)list=list.slice(0,MAX);save(list);render();
  };

  function mkThumb(url,mw,mh){return new Promise(function(res){
    var img=new Image();img.onload=function(){
      var w=img.width,h=img.height,s=Math.min(mw/w,mh/h,1);
      w=Math.round(w*s);h=Math.round(h*s);
      var c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',0.6));
    };img.onerror=function(){res(url)};img.src=url;
  })}

  function render(){
    var list=load(),c=$('historyList'),e=$('historyEmpty');
    c.querySelectorAll('.history-item').forEach(function(el){el.remove()});
    if(!list.length){e.style.display='flex';return}
    e.style.display='none';
    list.forEach(function(item){
      var el=document.createElement('div');el.className='history-item';
      el.innerHTML='<img class="history-thumb" src="'+item.thumb+'"><div class="history-info"><div class="history-name">'+esc(item.name)+'</div><div class="history-time">'+esc(item.time)+'</div></div><div class="history-actions"><button class="h-act dl" title="下载">⬇</button><button class="h-act pv" title="预览">👁</button><button class="h-act del" title="删除">✕</button></div>';
      el.querySelector('.dl').onclick=function(ev){ev.stopPropagation();var a=document.createElement('a');a.href=item.result;a.download=(item.name||'抠图结果')+'.png';document.body.appendChild(a);a.click();document.body.removeChild(a)};
      el.querySelector('.pv').onclick=function(ev){ev.stopPropagation();showResult(item)};
      el.querySelector('.del').onclick=function(ev){ev.stopPropagation();save(load().filter(function(x){return x.id!==item.id}));render()};
      el.onclick=function(){showResult(item)};
      c.appendChild(el);
    });
  }

  function showResult(item){
    $('resultImage').src=item.result;$('resultImage').style.display='block';
    $('previewSection').classList.add('active');$('downloadBtn').disabled=false;
    fetch(item.result).then(function(r){return r.blob()}).then(function(b){resultBlob=b});
    window.scrollTo({top:0,behavior:'smooth'});closeH();
  }

  function openH(){$('historyOverlay').classList.add('active');$('historyPanel').classList.add('active');render()}
  function closeH(){$('historyOverlay').classList.remove('active');$('historyPanel').classList.remove('active')}
  $('historyBtn').onclick=openH;$('historyClose').onclick=closeH;$('historyOverlay').onclick=closeH;
  $('historyClearBtn').onclick=function(){if(confirm('确定清空所有记录？')){save([]);render()}};
  render();
})();

downloadBtn.addEventListener('click',function(){
  if(!resultBlob){showMsg('没有可保存的结果','error');return}
  var a=document.createElement('a');a.href=URL.createObjectURL(resultBlob);
  a.download='抠图结果_'+Date.now()+'.png';document.body.appendChild(a);a.click();
  document.body.removeChild(a);showMsg('保存成功！','success');
});

resetBtn.addEventListener('click',function(){
  fileInput.value='';originalFile=null;resultBlob=null;
  originalImage.src='';resultImage.src='';resultImage.style.display='none';
  loadingEl.classList.remove('active');downloadBtn.disabled=true;
  previewSection.classList.remove('active');messageEl.classList.remove('active');
  window.scrollTo({top:0,behavior:'smooth'});
});

function showMsg(text,type){
  var icons={success:'✅',error:'❌',info:'💡'};
  messageEl.querySelector('span').innerHTML=(icons[type]||'💡')+' '+text;
  messageEl.className='msg '+(type||'info')+' active';
  setTimeout(function(){messageEl.classList.remove('active')},5500);
}

})();
</script>
</body>
</html>
