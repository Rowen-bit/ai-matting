<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>抠图工坊</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
/* ===== 像素工坊风格 ===== */
*{margin:0;padding:0;box-sizing:border-box}

:root{
  /* 工坊暖色调 */
  --wood-dark:#2d1f16;
  --wood-mid:#4a3428;
  --wood-light:#6b4e3d;
  --wood-glow:#8b6914;
  --parchment:#f5e6c8;
  --parchment-dark:#e8d5b5;
  --amber:#d4a84b;
  --amber-dark:#b88d3e;
  --copper:#b87333;
  --iron:#5a5a5a;
  --text-dark:#2d1f16;
  --text-light:#f5e6c8;
  --accent-glow:#ffd700;
  --forge-orange:#e85d04;
  --forge-red:#9d0208;
}

body{
  font-family:'ZCOOL KuaiLe','Microsoft YaHei',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
  color:var(--text-light);
  background:#1a120b;
}

/* ===== 工坊背景图 ===== */
.scene-bg{
  position:fixed;inset:0;z-index:-1;
  background:url('https://rowen-bit.github.io/ai-matting/bg-workshop.jpg') center/cover no-repeat;
}
.scene-bg::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg, rgba(26,18,11,0.3) 0%, rgba(26,18,11,0.1) 50%, rgba(26,18,11,0.4) 100%);
  pointer-events:none;
}

/* ===== 主容器 ===== */
.main-wrap{
  position:relative;
  max-width:600px;
  margin:0 auto;
  padding:1.5rem 1rem 2rem;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ===== 工坊风格对话框 ===== */
.workshop-dialog{
  width:100%;
  background:linear-gradient(180deg, var(--parchment) 0%, var(--parchment-dark) 100%);
  border:4px solid var(--wood-glow);
  border-radius:12px;
  padding:1.2rem;
  position:relative;
  box-shadow:
    0 0 0 2px var(--wood-dark),
    0 6px 0 var(--wood-mid),
    0 8px 25px rgba(0,0,0,0.5),
    inset 0 1px 0 rgba(255,255,255,0.3);
  color:var(--text-dark);
}

/* 铆钉装饰 */
.workshop-dialog::before,
.workshop-dialog::after{
  content:'';position:absolute;
  width:12px;height:12px;
  background:radial-gradient(circle, var(--copper) 30%, var(--wood-dark) 70%);
  border-radius:50%;
  box-shadow:0 1px 2px rgba(0,0,0,0.4);
}
.workshop-dialog::before{top:8px;left:8px}
.workshop-dialog::after{top:8px;right:8px}

.rivet-bl,.rivet-br{
  position:absolute;
  width:12px;height:12px;
  background:radial-gradient(circle, var(--copper) 30%, var(--wood-dark) 70%);
  border-radius:50%;
  box-shadow:0 1px 2px rgba(0,0,0,0.4);
}
.rivet-bl{bottom:8px;left:8px}
.rivet-br{bottom:8px;right:8px}

/* ===== 标题 ===== */
.game-header{
  text-align:center;
  margin:1rem 0 1.5rem;
}

.title-banner{
  display:inline-block;
  background:linear-gradient(180deg, var(--amber) 0%, var(--amber-dark) 100%);
  border:4px solid var(--wood-dark);
  border-radius:8px;
  padding:0.8rem 2rem;
  box-shadow:
    0 4px 0 var(--wood-mid),
    0 6px 15px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.3);
  position:relative;
}

.title-banner::before,.title-banner::after{
  content:'';position:absolute;
  width:10px;height:10px;
  background:var(--wood-dark);
  border-radius:50%;
  top:50%;transform:translateY(-50%);
}
.title-banner::before{left:8px}
.title-banner::after{right:8px}

.title-banner h1{
  font-size:1.5rem;
  color:var(--wood-dark);
  text-shadow:1px 1px 0 rgba(255,255,255,0.4);
  letter-spacing:4px;
}

.title-sub{
  font-size:0.85rem;
  color:var(--parchment);
  margin-top:0.5rem;
  text-shadow:1px 1px 2px rgba(0,0,0,0.8);
}

/* ===== 工坊风格按钮 ===== */
.ws-btn{
  display:block;width:100%;
  padding:0.7rem 1rem;
  font-family:inherit;font-size:1rem;
  border:3px solid var(--wood-dark);
  border-radius:6px;
  cursor:pointer;
  text-align:center;
  position:relative;
  font-weight:bold;
  transition:all 0.1s;
  text-shadow:1px 1px 0 rgba(0,0,0,0.2);
}

/* 铜色按钮 - 主要 */
.ws-btn-copper{
  background:linear-gradient(180deg, #cd7f32 0%, #a0522d 100%);
  color:var(--parchment);
  box-shadow:0 4px 0 #8b4513, 0 6px 10px rgba(0,0,0,0.3);
}
.ws-btn-copper:hover{background:linear-gradient(180deg, #d68c40 0%, #b06030 100%)}
.ws-btn-copper:active{
  box-shadow:0 1px 0 #8b4513;transform:translateY(3px);
}

/* 铁色按钮 - 次要 */
.ws-btn-iron{
  background:linear-gradient(180deg, #708090 0%, #4a5560 100%);
  color:var(--parchment);
  box-shadow:0 4px 0 #2d3740, 0 6px 10px rgba(0,0,0,0.3);
}
.ws-btn-iron:hover{background:linear-gradient(180deg, #8090a0 0%, #5a6570 100%)}
.ws-btn-iron:active{
  box-shadow:0 1px 0 #2d3740;transform:translateY(3px);
}

/* 炉火按钮 - 强调 */
.ws-btn-fire{
  background:linear-gradient(180deg, #e85d04 0%, #9d0208 100%);
  color:var(--parchment);
  box-shadow:0 4px 0 #6b1008, 0 6px 10px rgba(0,0,0,0.3);
}
.ws-btn-fire:hover{background:linear-gradient(180deg, #f07020 0%, #b03018 100%)}
.ws-btn-fire:active{
  box-shadow:0 1px 0 #6b1008;transform:translateY(3px);
}

.ws-btn:disabled{
  opacity:0.5;cursor:not-allowed;filter:grayscale(0.5);
}

/* ===== 上传区域 ===== */
.upload-area{
  border:3px dashed var(--wood-light);
  border-radius:10px;
  padding:2.5rem 1rem;
  text-align:center;
  cursor:pointer;
  background:repeating-linear-gradient(
    45deg,
    rgba(245,230,200,0.1) 0px,rgba(245,230,200,0.1) 10px,
    rgba(245,230,200,0.05) 10px,rgba(245,230,200,0.05) 20px
  );
  transition:all 0.15s;
}

.upload-area:hover{
  border-color:var(--amber);
  background:rgba(212,168,75,0.15);
}

.upload-area.drag-over{
  border-color:var(--forge-orange);
  background:rgba(232,93,4,0.15);
  transform:scale(1.02);
}

.upload-icon{font-size:2.5rem;margin-bottom:0.6rem;filter:drop-shadow(1px 1px 1px rgba(0,0,0,0.3))}
.upload-text{font-size:1.1rem;color:var(--text-dark);margin-bottom:0.4rem;font-weight:bold}
.upload-hint{font-size:0.8rem;color:var(--wood-mid)}

#fileInput{display:none}

/* ===== 消息提示 ===== */
.msg{
  display:none;padding:0.8rem 1rem;font-size:0.9rem;
  border-radius:8px;margin-top:0.8rem;
  border:2px solid;
  font-weight:bold;
}
.msg.active{display:block;animation:msgBounce 0.3s ease-out}
@keyframes msgBounce{0%{transform:scale(0.9);opacity:0}100%{transform:scale(1);opacity:1}}

.msg.success{background:rgba(106,176,76,0.2);border-color:#4a8a2c;color:#2d5a1e}
.msg.error{background:rgba(231,76,60,0.2);border-color:#c0392b;color:#7b1c1c}
.msg.info{background:rgba(93,173,226,0.2);border-color:#2e86c1;color:#1a4a6e}

/* ===== 预览区域 ===== */
.preview-section{display:none}
.preview-section.active{display:block;animation:slideUp 0.4s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.section-title{
  text-align:center;font-size:1.1rem;
  color:var(--wood-dark);
  margin:1rem 0 0.8rem;
  font-weight:bold;
  text-shadow:1px 1px 0 rgba(255,255,255,0.5);
}

.preview-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;
}

@media(max-width:520px){.preview-grid{grid-template-columns:1fr}}

.preview-card{
  background:linear-gradient(180deg, #faf0dc 0%, #f0e4c8 100%);
  border:3px solid var(--wood-glow);
  border-radius:8px;
  overflow:hidden;
  box-shadow:0 3px 0 var(--wood-mid), inset 0 1px 0 rgba(255,255,255,0.5);
}

.card-label{
  font-size:0.8rem;font-weight:bold;
  color:var(--text-dark);
  padding:0.5rem 0.6rem;
  text-align:center;
  border-bottom:2px solid var(--wood-glow);
  background:linear-gradient(180deg, rgba(212,168,75,0.3) 0%, rgba(212,168,75,0.1) 100%);
}

.image-frame{
  min-height:140px;
  display:flex;align-items:center;justify-content:center;
  padding:0.5rem;
  background:#faf0dc;
}

.image-frame img{
  max-width:100%;max-height:200px;object-fit:contain;
  border-radius:4px;
  box-shadow:0 2px 6px rgba(0,0,0,0.15);
}

/* 透明背景棋盘格 */
.result-frame{
  background-image:
    linear-gradient(45deg, #e8dcc8 25%, transparent 25%),
    linear-gradient(-45deg, #e8dcc8 25%, transparent 25%),
    linear-gradient(45deg, transparent 75%, #e8dcc8 75%),
    linear-gradient(-45deg, transparent 75%, #e8dcc8 75%);
  background-size:14px 14px;
  background-position:0 0,0 7px,7px -7px,-7px 0;
  background-color:#faf0dc;
}

/* ===== 加载动画 ===== */
.loading-overlay{
  position:absolute;inset:0;
  background:rgba(250,240,220,0.95);
  display:none;flex-direction:column;
  align-items:center;justify-content:center;gap:0.6rem;
  z-index:10;border-radius:0 0 5px 5px;
}
.loading-overlay.active{display:flex}

/* 铁砧锤击动画 */
.loader-icon{
  font-size:2.2rem;
  animation:forgeHammer 0.8s ease-in-out infinite;
  filter:drop-shadow(1px 1px 2px rgba(0,0,0,0.3));
}
@keyframes forgeHammer{
  0%,100%{transform:translateY(0) rotate(0)}
  25%{transform:translateY(-5px) rotate(-10deg)}
  50%{transform:translateY(0) rotate(0)}
  75%{transform:translateY(-3px) rotate(5deg)}
}

.loading-text{font-size:0.95rem;color:var(--text-dark);font-weight:bold}
.loading-sub{font-size:0.8rem;color:var(--wood-mid)}

/* 进度条 - 熔炉风格 */
.progress-track{
  width:170px;height:14px;
  background:var(--wood-dark);
  border:2px solid var(--wood-mid);
  border-radius:7px;overflow:hidden;
  box-shadow:inset 0 2px 4px rgba(0,0,0,0.4);
}
.progress-fill{
  height:100%;
  background:linear-gradient(180deg, #e85d04 0%, #9d0208 100%);
  border-radius:5px;
  transition:width 0.3s;
  width:0%;
  box-shadow:0 0 10px rgba(232,93,4,0.5);
}

/* ===== 按钮组 ===== */
.btn-group{
  display:flex;gap:0.7rem;justify-content:center;flex-wrap:wrap;
  margin-top:1.2rem;width:100%;
}
.btn-group .ws-btn{width:auto;min-width:130px}

/* ===== 底部 ===== */
.footer{
  text-align:center;padding:1.5rem 1rem;font-size:0.8rem;
  color:rgba(245,230,200,0.7);margin-top:auto;
  text-shadow:1px 1px 2px rgba(0,0,0,0.8);
}

/* ===== 历史记录按钮 ===== */
.history-btn{
  position:fixed;top:1rem;right:1rem;
  width:48px;height:48px;
  background:linear-gradient(180deg, var(--parchment) 0%, var(--parchment-dark) 100%);
  border:3px solid var(--wood-glow);
  border-radius:10px;
  font-size:1.3rem;
  cursor:pointer;z-index:100;
  box-shadow:0 3px 0 var(--wood-mid),0 4px 10px rgba(0,0,0,0.3);
  display:flex;align-items:center;justify-content:center;
  transition:none;
}
.history-btn:active{
  box-shadow:0 1px 0 var(--wood-mid);transform:translateY(2px);
}

/* ===== 历史面板 ===== */
.history-overlay{
  position:fixed;inset:0;
  background:rgba(26,18,11,0.7);
  z-index:2000;
  opacity:0;pointer-events:none;
  transition:opacity 0.2s;
}
.history-overlay.active{opacity:1;pointer-events:auto}

.history-panel{
  position:fixed;top:0;right:-360px;
  width:320px;max-width:90vw;height:100vh;
  background:linear-gradient(180deg, var(--parchment) 0%, var(--parchment-dark) 100%);
  border-left:4px solid var(--wood-glow);
  box-shadow:-4px 0 0 var(--wood-mid),-8px 0 25px rgba(0,0,0,0.5);
  z-index:2001;display:flex;flex-direction:column;
  transition:right 0.3s ease-out;
}
.history-panel.active{right:0}

.history-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:1rem;
  border-bottom:3px solid var(--wood-glow);
  background:linear-gradient(180deg, rgba(212,168,75,0.3) 0%, rgba(212,168,75,0.1) 100%);
}
.history-title{font-size:1.1rem;color:var(--text-dark);font-weight:bold}
.history-close{
  width:36px;height:36px;
  background:linear-gradient(180deg, #e85d04, #9d0208);
  border:2px solid var(--wood-dark);border-radius:6px;
  color:var(--parchment);font-size:1rem;cursor:pointer;
  box-shadow:0 2px 0 #6b1008;
  display:flex;align-items:center;justify-content:center;
}
.history-close:active{box-shadow:0 0 0 #6b1008;transform:translateY(2px)}

.history-list{
  flex:1;overflow-y:auto;padding:1rem;
  display:flex;flex-direction:column;gap:0.6rem;
}
.history-empty{
  flex:1;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:var(--wood-mid);gap:0.6rem;text-align:center;font-size:0.95rem;
}
.history-empty-icon{font-size:2.8rem;opacity:0.5}

.history-item{
  background:linear-gradient(180deg, #faf0dc 0%, #f0e4c8 100%);
  border:2px solid var(--wood-glow);
  border-radius:8px;
  padding:0.7rem;
  display:flex;gap:0.6rem;align-items:center;
  cursor:pointer;
  box-shadow:0 2px 0 var(--wood-mid);
}
.history-item:hover{border-color:var(--amber);background:#fff8e8}

.history-thumb{
  width:52px;height:52px;object-fit:cover;
  border:2px solid var(--wood-glow);border-radius:4px;flex-shrink:0;
}
.history-info{flex:1;min-width:0}
.history-name{font-size:0.8rem;color:var(--text-dark);word-break:break-all;font-weight:bold}
.history-time{font-size:0.7rem;color:var(--wood-mid);margin-top:3px}

.history-actions{display:flex;gap:0.35rem;flex-shrink:0}
.h-act{
  width:32px;height:32px;
  border:2px solid var(--wood-glow);border-radius:5px;
  font-size:0.8rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  background:#faf0dc;color:var(--text-dark);
}
.h-act:hover{border-color:var(--amber)}
.h-act.del:hover{border-color:#e85d04;color:#e85d04}

.history-footer{
  padding:1rem;border-top:3px solid var(--wood-glow);
  background:linear-gradient(180deg, rgba(212,168,75,0.3) 0%, rgba(212,168,75,0.1) 100%);
  display:flex;justify-content:flex-end;
}

/* 滚动条 - 木质风格 */
::-webkit-scrollbar{width:12px}
::-webkit-scrollbar-track{background:var(--parchment-dark);border-radius:6px}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg, var(--wood-light) 0%, var(--wood-mid) 100%);border-radius:6px;border:2px solid var(--parchment-dark)}
::-webkit-scrollbar-thumb:hover{background:var(--wood-glow)}

/* ===== 响应式 ===== */
@media(max-width:520px){
  .title-banner h1{font-size:1.2rem;letter-spacing:2px}
  .workshop-dialog{padding:1rem}
  .upload-area{padding:1.5rem 0.5rem}
  .history-panel{width:100vw;max-width:100vw}
  .btn-group .ws-btn{min-width:110px;font-size:0.9rem}
}
</style>
</head>
<body>

<!-- 工坊背景 -->
<div class="scene-bg"></div>

<!-- 历史记录按钮 -->
<button class="history-btn" id="historyBtn" title="历史记录">📜</button>

<!-- 主内容 -->
<div class="main-wrap">

  <!-- 标题 -->
  <header class="game-header">
    <div class="title-banner">
      <h1>⚒️ 抠图工坊</h1>
    </div>
    <p class="title-sub">上传图片 · 一键去背景 · 保存透明图</p>
  </header>

  <!-- 上传面板 -->
  <div class="workshop-dialog" style="margin-bottom:1rem">
    <div class="rivet-bl"></div><div class="rivet-br"></div>
    <div class="upload-area" id="uploadArea">
      <div class="upload-icon">🖼️</div>
      <div class="upload-text">点击选择或拖拽图片到此处</div>
      <div class="upload-hint">支持 JPG、PNG、WebP 格式 · 大图自动压缩</div>
    </div>
    <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp">
    <div class="msg" id="message"><span></span></div>
  </div>

  <!-- 预览区域 -->
  <div class="preview-section" id="previewSection">
    <div class="workshop-dialog">
      <div class="rivet-bl"></div><div class="rivet-br"></div>
      <div class="section-title">✨ 处理结果</div>
      <div class="preview-grid">
        <div class="preview-card">
          <div class="card-label">📷 原图</div>
          <div class="image-frame"><img id="originalImage" alt="原图"></div>
        </div>
        <div class="preview-card">
          <div class="card-label">🎯 抠图结果</div>
          <div class="image-frame result-frame" style="position:relative">
            <div class="loading-overlay" id="loading">
              <div class="loader-icon">⚒️</div>
              <div class="loading-text" id="loadingText">正在锻造中...</div>
              <div class="loading-sub" id="loadingProgress">准备就绪</div>
              <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
            </div>
            <img id="resultImage" alt="抠图结果" style="display:none;">
          </div>
        </div>
      </div>
      <div class="btn-group">
        <button class="ws-btn ws-btn-copper" id="downloadBtn" disabled>
          💾 保存成果
        </button>
        <button class="ws-btn ws-btn-iron" id="resetBtn">
          🔄 重新开始
        </button>
      </div>
    </div>
  </div>

  <footer class="footer">
    🔥 基于阿里云分割接口 · 抠图工坊 2026
  </footer>

</div>

<!-- 历史面板 -->
<div class="history-overlay" id="historyOverlay"></div>
<div class="history-panel" id="historyPanel">
  <div class="history-header">
    <span class="history-title">📜 工坊记录</span>
    <button class="history-close" id="historyClose">✕</button>
  </div>
  <div class="history-list" id="historyList">
    <div class="history-empty" id="historyEmpty">
      <div class="history-empty-icon">📦</div>
      <p>暂无记录</p>
      <p>完成抠图后会自动保存</p>
    </div>
  </div>
  <div class="history-footer">
    <button class="ws-btn ws-btn-fire" id="historyClearBtn" style="font-size:0.85rem;padding:0.5rem 1rem;width:auto">
      🗑️ 清空记录
    </button>
  </div>
</div>

<script>
(function(){
'use strict';

var $=function(id){return document.getElementById(id)};
var uploadArea=$('uploadArea'),fileInput=$('fileInput'),
    previewSection=$('previewSection'),originalImage=$('originalImage'),
    resultImage=$('resultImage'),loadingEl=$('loading'),
    loadingText=$('loadingText'),loadingProgress=$('loadingProgress'),
    progressFill=$('progressFill'),downloadBtn=$('downloadBtn'),
    resetBtn=$('resetBtn'),messageEl=$('message');

var originalFile=null,resultBlob=null;
var PROXY_URL=localStorage.getItem('api')||'https://matting-ai-matting-svc-evgawfnhsq.cn-shanghai.fcapp.run/api/matting';

uploadArea.addEventListener('click',function(e){e.preventDefault();fileInput.click()});
fileInput.addEventListener('change',function(e){if(e.target.files[0])handleFile(e.target.files[0])});
uploadArea.addEventListener('dragover',function(e){e.preventDefault();uploadArea.classList.add('drag-over')});
uploadArea.addEventListener('dragleave',function(e){e.preventDefault();uploadArea.classList.remove('drag-over')});
uploadArea.addEventListener('drop',function(e){
  e.preventDefault();uploadArea.classList.remove('drag-over');
  var f=e.dataTransfer.files[0];
  if(f&&f.type.startsWith('image/'))handleFile(f);else showMsg('请选择图片文件','error');
});

function handleFile(file){
  if(!file.type.match(/^image\/(jpeg|png|webp)$/)){showMsg('仅支持 JPG、PNG、WebP 格式','error');return}
  originalFile=file;
  var r=new FileReader();
  r.onload=function(e){
    originalImage.src=e.target.result;
    previewSection.classList.add('active');
    resultImage.style.display='none';loadingEl.classList.remove('active');
    showMsg('图片已加载，开始锻造...','info');
    startProcessing();
  };
  r.readAsDataURL(file);
}

function setProgress(pct,text,sub){
  if(pct!==null)progressFill.style.width=pct+'%';
  if(text)loadingText.textContent=text;
  if(sub)loadingProgress.textContent=sub;
}

function compressToBase64(file){
  return new Promise(function(resolve,reject){
    var img=new Image();img.onload=function(){
      var levels=[{maxDim:1600,quality:0.90},{maxDim:1200,quality:0.85},{maxDim:1000,quality:0.80},{maxDim:800,quality:0.75},{maxDim:600,quality:0.70}];
      var maxS=3.5*1024*1024,b64=null;
      for(var i=0;i<levels.length;i++){
        var l=levels[i],w=img.width,h=img.height;
        if(w>l.maxDim||h>l.maxDim){var s=Math.min(l.maxDim/w,l.maxDim/h);w=Math.round(w*s);h=Math.round(h*s)}
        var c=document.createElement('canvas');c.width=w;c.height=h;
        c.getContext('2d').drawImage(img,0,0,w,h);
        b64=c.toDataURL('image/jpeg',l.quality).split(',')[1];
        if(b64.length<=maxS)break;
      }
      resolve(b64);
    };img.onerror=reject;img.src=URL.createObjectURL(file);
  });
}

async function startProcessing(){
  if(!originalFile)return;
  loadingEl.classList.add('active');resultImage.style.display='none';downloadBtn.disabled=true;
  try{
    setProgress(15,'正在淬炼图片...','调整尺寸');
    var b64=await compressToBase64(originalFile);
    setProgress(30,'正在连接工坊...','发送请求');
    var resp=await fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({image:b64})});
    if(!resp.ok){var ed;try{ed=await resp.json()}catch(e){}throw new Error((ed&&ed.error)||'请求失败 (状态 '+resp.status+')')}
    setProgress(70,'正在精密切割...','AI锻造中');
    var blob=await resp.blob();
    if(!blob||blob.size===0)throw new Error('未获得处理结果');
    setProgress(90,'打磨边缘中...','');
    resultBlob=blob;resultImage.src=URL.createObjectURL(blob);resultImage.style.display='block';
    downloadBtn.disabled=false;setProgress(100,'锻造完成！','');
    setTimeout(function(){loadingEl.classList.remove('active')},500);
    showMsg('处理成功！点击「保存成果」下载','success');
    if(window.addMattingHistory)window.addMattingHistory(resultImage.src);
  }catch(err){
    console.error(err);loadingEl.classList.remove('active');
    showMsg('锻造失败：'+err.message,'error');
  }
}

// 历史记录
(function(){
  var KEY='matting_history',MAX=20;
  function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return[]}}
  function save(l){localStorage.setItem(KEY,JSON.stringify(l))}
  function esc(s){var d=document.createElement('div');d.textContent=s;return d.innerHTML}

  window.addMattingHistory=async function(dataUrl){
    var list=load(),thumb=await mkThumb(dataUrl,200,200);
    list.unshift({id:Date.now(),name:'抠图_'+new Date().toLocaleString('zh-CN'),time:new Date().toLocaleString('zh-CN'),thumb:thumb,result:dataUrl});
    if(list.length>MAX)list=list.slice(0,MAX);save(list);render();
  };

  function mkThumb(url,mw,mh){return new Promise(function(res){
    var img=new Image();img.onload=function(){
      var w=img.width,h=img.height,s=Math.min(mw/w,mh/h,1);
      w=Math.round(w*s);h=Math.round(h*s);
      var c=document.createElement('canvas');c.width=w;c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',0.6));
    };img.onerror=function(){res(url)};img.src=url;
  })}

  function render(){
    var list=load(),c=$('historyList'),e=$('historyEmpty');
    c.querySelectorAll('.history-item').forEach(function(el){el.remove()});
    if(!list.length){e.style.display='flex';return}
    e.style.display='none';
    list.forEach(function(item){
      var el=document.createElement('div');el.className='history-item';
      el.innerHTML='<img class="history-thumb" src="'+item.thumb+'"><div class="history-info"><div class="history-name">'+esc(item.name)+'</div><div class="history-time">'+esc(item.time)+'</div></div><div class="history-actions"><button class="h-act dl" title="下载">⬇</button><button class="h-act pv" title="预览">👁</button><button class="h-act del" title="删除">✕</button></div>';
      el.querySelector('.dl').onclick=function(ev){ev.stopPropagation();var a=document.createElement('a');a.href=item.result;a.download=(item.name||'抠图结果')+'.png';document.body.appendChild(a);a.click();document.body.removeChild(a)};
      el.querySelector('.pv').onclick=function(ev){ev.stopPropagation();showResult(item)};
      el.querySelector('.del').onclick=function(ev){ev.stopPropagation();save(load().filter(function(x){return x.id!==item.id}));render()};
      el.onclick=function(){showResult(item)};
      c.appendChild(el);
    });
  }

  function showResult(item){
    $('resultImage').src=item.result;$('resultImage').style.display='block';
    $('previewSection').classList.add('active');$('downloadBtn').disabled=false;
    fetch(item.result).then(function(r){return r.blob()}).then(function(b){resultBlob=b});
    window.scrollTo({top:0,behavior:'smooth'});closeH();
  }

  function openH(){$('historyOverlay').classList.add('active');$('historyPanel').classList.add('active');render()}
  function closeH(){$('historyOverlay').classList.remove('active');$('historyPanel').classList.remove('active')}
  $('historyBtn').onclick=openH;$('historyClose').onclick=closeH;$('historyOverlay').onclick=closeH;
  $('historyClearBtn').onclick=function(){if(confirm('确定清空所有记录？')){save([]);render()}};
  render();
})();

downloadBtn.addEventListener('click',function(){
  if(!resultBlob){showMsg('没有可保存的成果','error');return}
  var a=document.createElement('a');a.href=URL.createObjectURL(resultBlob);
  a.download='抠图成果_'+Date.now()+'.png';document.body.appendChild(a);a.click();
  document.body.removeChild(a);showMsg('保存成功！','success');
});

resetBtn.addEventListener('click',function(){
  fileInput.value='';originalFile=null;resultBlob=null;
  originalImage.src='';resultImage.src='';resultImage.style.display='none';
  loadingEl.classList.remove('active');downloadBtn.disabled=true;
  previewSection.classList.remove('active');messageEl.classList.remove('active');
  window.scrollTo({top:0,behavior:'smooth'});
});

function showMsg(text,type){
  var icons={success:'✅',error:'❌',info:'💡'};
  messageEl.querySelector('span').innerHTML=(icons[type]||'💡')+' '+text;
  messageEl.className='msg '+(type||'info')+' active';
  setTimeout(function(){messageEl.classList.remove('active')},5500);
}

})();
</script>
